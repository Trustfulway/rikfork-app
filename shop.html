<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RikForks Shop</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { margin: 0; font-family: Arial; background: #f5f5f5; }
    header { background: black; color: white; padding: 15px; text-align: center; font-size: 24px; }
    .products { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 20px; padding: 20px; }
    .card { background: white; padding: 15px; border-radius: 10px; text-align: center; }
    .card img { width: 100%; border-radius: 10px; }
    .btn { display: inline-block; margin-top: 10px; padding: 10px; background: black; color: white; text-decoration: none; border-radius: 5px; }
  </style>
</head>
<body>

<header>RikForks Shop 🛍️</header>

<div class="products">

  <div class="card">
    <img src="https://picsum.photos/300?random=1">
    <h3>Wireless Headphones</h3>
    <p>$49.99</p>
    <a href="#" class="btn">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300?random=2">
    <h3>Smart Laptop</h3>
    <p>$899.99</p>
    <a href="#" class="btn">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://picsum.photos/300?random=3">
    <h3>Smart Watch</h3>
    <p>$199.99</p>
    <a href="#" class="btn">Buy Now</a>
  </div>

</div>

</body>
</html>
