<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RikForks</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }
    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
      font-size: 24px;
    }
    .hero {
      text-align: center;
      padding: 60px 20px;
    }
    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .card img {
      width: 100%;
      border-radius: 10px;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }
  </style>
</head>
<body>

<header>RikForks 🍴</header>

<div class="hero">
  <h1>Welcome to RikForks</h1>
  <p>Your smart store for quality products</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Product 1">
    <h3>Product 1</h3>
    <p>$19.99</p>
    <a href="#" class="btn">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Product 2">
    <h3>Product 2</h3>
    <p>$29.99</p>
    <a href="#" class="btn">Buy Now</a>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/200" alt="Product 3">
    <h3>Product 3</h3>
    <p>$39.99</p>
    <a href="#" class="btn">Buy Now</a>
  </div>

</div>

</body>
</html>
